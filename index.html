<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 1분 영어 퀴즈 ⚡</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>📝 오늘의 영어 퀴즈</h1>
        <hr>
        
        <div id="quiz-box">
            <div id="question" class="question-text">문제가 여기에 나타납니다.</div>
            <div id="options" class="options-container">
                </div>
        </div>

        <div id="result-box" class="result-text hidden">
            <p id="feedback"></p>
        </div>

        <button id="next-btn" class="btn hidden">다음 문제 ➡️</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
